id = "notepad"
label = "Notepad"
schema_version = 1
use_scope = "productivity"
mode = "a11y_only"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "notepad.exe"
title_regex = ".* - Notepad$"

[[matches]]
exe = "Notepad.exe"

[[matches]]
title_regex = "^Save As$"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
cut = "ctrl+x"
find = "ctrl+f"
new_file = "ctrl+n"
open = "ctrl+o"
paste = "ctrl+v"
save = "ctrl+s"
select_all = "ctrl+a"
undo = "ctrl+z"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"
