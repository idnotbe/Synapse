id = "chrome"
label = "Google Chrome"
schema_version = 1
use_scope = "productivity"
mode = "hybrid"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "chrome.exe"
title_regex = ".* - Google Chrome$"

[[matches]]
exe = "msedge.exe"
title_regex = ".* - Microsoft Edge$"

[[matches]]
exe = "chromium.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
address_bar = "ctrl+l"
back = "alt+left"
forward = "alt+right"
new_tab = "ctrl+t"
reload = "ctrl+r"
switch_tab_left = "ctrl+shift+tab"
switch_tab_right = "ctrl+tab"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"
