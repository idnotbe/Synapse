<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Synapse bridge locator — open shadow DOM fixture (#1335)</title>
</head>
<body>
  <!--
    Regression fixture for #1335: the normal Chrome-bridge selector engine must
    pierce OPEN shadow roots (LinkedIn moved its messaging compose into an open
    shadow root hosted by <div id="interop-outlet">). This reproduces that exact
    shape — an open-shadow host containing a contenteditable[role=textbox] and a
    submit button, plus a NESTED shadow root, plus a light-DOM control.

    Expected with the shadow-aware engine (see service_worker.js):
      css ".msg-form__contenteditable"  -> 1 match (inside shadow), path contains "s"
      css ".msg-form__send-button"      -> 1 match (inside shadow)
      css "#deep-input"                 -> 1 match (nested shadow), path contains two "s" hops
      css "#light-name"                 -> 1 match (light DOM), pure-numeric path
      role textbox                      -> includes the shadow editor
    Every resolved element id must round-trip exactly through elementByPath.
  -->
  <input id="light-name" placeholder="Light name" />

  <div id="interop-outlet-fixture"></div>

  <script>
    const host = document.getElementById('interop-outlet-fixture');
    const sr = host.attachShadow({ mode: 'open' });

    const editor = document.createElement('div');
    editor.className = 'msg-form__contenteditable';
    editor.setAttribute('contenteditable', 'true');
    editor.setAttribute('role', 'textbox');
    editor.setAttribute('aria-label', 'Write a message…'); // unicode ellipsis, like LinkedIn
    sr.appendChild(editor);

    const send = document.createElement('button');
    send.className = 'msg-form__send-button';
    send.type = 'submit';
    send.textContent = 'Send';
    sr.appendChild(send);

    // Nested open shadow root, to prove multi-hop ("s.<i>.s.<i>") path traversal.
    const innerHost = document.createElement('div');
    innerHost.id = 'inner-host';
    sr.appendChild(innerHost);
    const isr = innerHost.attachShadow({ mode: 'open' });
    const deep = document.createElement('input');
    deep.id = 'deep-input';
    deep.setAttribute('aria-label', 'Deep field');
    isr.appendChild(deep);
  </script>
</body>
</html>
