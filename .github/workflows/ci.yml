name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: "17 8 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-ubuntu:
    name: rust / ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --no-default-features
      - run: cargo build --release --workspace
      - run: bash scripts/check_dep_graph.sh

  rust-windows:
    name: rust / windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --no-default-features
      - run: cargo build --release --workspace

  security-ubuntu:
    name: security / ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo deny check
      - run: cargo audit

  snapshots-ubuntu:
    name: snapshots / ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-insta
      - run: cargo test -p synapse-core --test snapshots
      - run: cargo insta pending-snapshots --workspace

  docs-check:
    name: docs / markdown links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: scripts/check_docs.ps1
